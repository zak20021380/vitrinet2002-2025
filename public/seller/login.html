<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="refresh" content="3;url=/login.html" />
  <title>ورود فروشنده | ویترینت</title>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --brand-primary: #10b981;
      --brand-secondary: #0ea5e9;
      --text-primary: #0f172a;
      --text-muted: #64748b;
      --surface: rgba(255, 255, 255, 0.96);
      --line-soft: rgba(148, 163, 184, 0.24);
      --shadow-main: 0 18px 45px -22px rgba(15, 23, 42, 0.35), 0 10px 24px -22px rgba(14, 165, 233, 0.55);
      --shadow-focus: 0 0 0 4px rgba(14, 165, 233, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1rem;
      font-family: 'Vazirmatn', sans-serif;
      color: var(--text-primary);
      background:
        radial-gradient(circle at 20% 10%, rgba(16, 185, 129, 0.14), transparent 42%),
        radial-gradient(circle at 85% 12%, rgba(14, 165, 233, 0.16), transparent 38%),
        linear-gradient(145deg, #effaf6 0%, #f7fafc 48%, #ecf8ff 100%);
    }

    .card {
      width: 100%;
      max-width: 28rem;
      border-radius: 1.25rem;
      background: var(--surface);
      border: 1px solid var(--line-soft);
      box-shadow: var(--shadow-main);
      text-align: center;
      padding: 1.4rem 1.2rem;
    }

    .logo {
      margin: 0 0 0.35rem;
      font-size: 1.45rem;
      font-weight: 800;
      line-height: 1.2;
      background: linear-gradient(135deg, #0f172a 0%, #0b3f66 60%, #0ea5e9 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: transparent;
    }

    .message {
      margin: 0;
      font-size: 0.98rem;
      font-weight: 700;
      color: var(--text-muted);
    }

    .redirect-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 1rem;
      min-height: 2.7rem;
      padding: 0.62rem 1.15rem;
      border-radius: 0.85rem;
      text-decoration: none;
      color: #fff;
      font-size: 0.9rem;
      font-weight: 800;
      background: linear-gradient(92deg, var(--brand-primary) 0%, var(--brand-secondary) 100%);
      box-shadow: 0 12px 24px -16px rgba(14, 165, 233, 0.9);
      transition: transform 0.16s ease, filter 0.2s ease, box-shadow 0.2s ease;
    }

    .redirect-link:hover {
      transform: translateY(-1px);
      filter: brightness(1.03);
      box-shadow: 0 14px 28px -16px rgba(16, 185, 129, 0.88);
    }

    .redirect-link:focus-visible {
      outline: none;
      box-shadow: var(--shadow-focus);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1 class="logo">ویترینت</h1>
    <p class="message">در حال انتقال به صفحه ورود…</p>
    <a class="redirect-link" href="/login.html">رفتن به صفحه ورود</a>
  </main>

  <script>
    setTimeout(function () {
      window.location.replace('/login.html');
    }, 700);
  </script>
</body>
</html>
