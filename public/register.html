<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
  <meta http-equiv="Strict-Transport-Security" content="max-age=63072000; includeSubDomains; preload">
  <meta http-equiv="X-Frame-Options" content="DENY">
  <meta http-equiv="Referrer-Policy" content="no-referrer">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-XSS-Protection" content="1; mode=block">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="Permissions-Policy" content="geolocation=(), microphone=(), camera=()">

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ثبت‌نام کاربر - ویترینت</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@800;900&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet" />
  <style>
    :root {
      --bg-base: #fafbfc;
      --surface: #ffffff;
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --text-muted: #64748b;
      --brand-primary: #0ea5e9;
      --brand-primary-dark: #0284c7;
      --brand-gradient: linear-gradient(135deg, #0ea5e9 0%, #06b6d4 100%);
      --focus-ring: rgba(14, 165, 233, 0.15);
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      --shadow-lg: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
      --shadow-xl: 0 20px 40px -10px rgba(0, 0, 0, 0.15);
    }

    body {
      font-family: 'Vazirmatn', sans-serif;
      background: linear-gradient(145deg, #E0F7F5 0%, #EBF5FB 60%, #DCF0FA 100%);
      min-height: 100dvh;
      color: var(--text-primary);
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -110px;
      right: -80px;
      width: 400px;
      height: 400px;
      background: rgba(0, 196, 180, 0.22);
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -100px;
      left: -80px;
      width: 350px;
      height: 350px;
      background: rgba(0, 119, 182, 0.16);
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }

    /* Registration Form Component */
    .register-main {
      min-height: calc(100dvh - 72px);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 14px 1rem 1rem;
    }

    @media (min-height: 800px) {
      .register-main {
        padding-top: 18px;
      }
    }

    @media (max-height: 700px) {
      .register-main {
        padding-top: 12px;
        padding-bottom: 0.75rem;
      }
    }

    @media (max-height: 600px) {
      .register-main {
        padding-top: 10px;
        padding-bottom: 0.5rem;
        align-items: flex-start;
      }
    }

    .signup-card {
      width: min(100%, 440px);
      max-width: 440px;
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(24px) saturate(160%);
      border: 1.5px solid rgba(0,196,180,0.20);
      border-radius: 24px;
      box-shadow:
        0 8px 40px rgba(0, 150, 180, 0.13),
        inset 0 1px 0 rgba(255, 255, 255, 0.9);
      padding: 32px 36px;
      position: relative;
      overflow: hidden;
      z-index: 1;
    }

    .signup-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, #00C4B4 0%, #0077B6 100%);
    }

    /* Header */
    header {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(148, 163, 184, 0.12);
      box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05);
    }

    /* Vitreenet Brand Logo Styles - Compact */
    .vitreenet-brand {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.2rem 0.3rem;
      border-radius: 10px;
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .vitreenet-brand:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(14, 165, 233, 0.1);
    }

    .vitreenet-brand__mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .vitreenet-brand__mark svg {
      width: 32px;
      height: 32px;
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .vitreenet-brand:hover .vitreenet-brand__mark svg {
      transform: rotate(-5deg) scale(1.03);
    }

    .vitreenet-brand__text {
      display: flex;
      flex-direction: column;
      gap: 0.05rem;
      line-height: 1;
    }

    .vitreenet-brand__title {
      font-family: 'Poppins', sans-serif;
      font-weight: 800;
      font-size: 1rem;
      letter-spacing: 0.04em;
      background: linear-gradient(135deg, #0ea5e9 0%, #10b981 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      position: relative;
    }

    .vitreenet-brand__title::after {
      content: '';
      display: block;
      width: 18px;
      height: 3px;
      background: linear-gradient(90deg, #0ea5e9, #10b981);
      border-radius: 2px;
      margin-top: 1px;
    }

    .vitreenet-brand__subtitle {
      font-family: 'Vazirmatn', sans-serif;
      font-weight: 700;
      font-size: 0.65rem;
      color: #64748b;
    }

    /* City Badge - Compact */
    .city-badge {
      display: flex;
      align-items: center;
      gap: 0.15rem;
      padding: 0.25rem 0.5rem;
      border-radius: 9999px;
      background: linear-gradient(90deg, #10b981E6 70%, #0ea5e9E6);
      border: 1px solid rgba(255, 255, 255, 0.4);
      backdrop-filter: blur(5px);
      box-shadow: 0 2px 8px rgba(16, 185, 129, 0.2);
    }

    .city-badge svg {
      width: 14px;
      height: 14px;
      margin-left: 0.15rem;
      filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.1));
    }

    .city-badge span {
      font-weight: 700;
      color: white;
      font-size: 0.7rem;
      letter-spacing: 0.2px;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
    }

    /* Register Shop Button */
    .btn-register-shop {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.4rem 0.75rem;
      border-radius: 9999px;
      background: linear-gradient(90deg, #10b981 10%, #0ea5e9 100%);
      color: white !important;
      font-weight: 700;
      font-size: 0.7rem;
      text-decoration: none;
      white-space: nowrap;
      box-shadow: 0 2px 8px rgba(16, 185, 129, 0.3);
      transition: all 0.2s ease;
    }

    .btn-register-shop:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);
      filter: brightness(1.05);
    }

    nav a {
      color: var(--text-secondary) !important;
      padding: 0.3rem 0.5rem;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.8rem;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }

    nav a:hover {
      color: var(--brand-primary-dark) !important;
      background: rgba(14, 165, 233, 0.08);
      transform: translateY(-1px);
    }

    .nav-link-accent {
      color: var(--brand-primary-dark) !important;
      background: linear-gradient(135deg, rgba(14, 165, 233, 0.12) 0%, rgba(6, 182, 212, 0.1) 100%);
    }

    /* Mobile Optimizations */
    @media (max-width: 640px) {
      .vitreenet-brand {
        gap: 0.3rem;
        padding: 0.15rem 0.2rem;
      }

      .vitreenet-brand__mark svg {
        width: 28px;
        height: 28px;
      }

      .vitreenet-brand__title {
        font-size: 0.9rem;
      }

      .vitreenet-brand__title::after {
        width: 16px;
        height: 2.5px;
      }

      .vitreenet-brand__subtitle {
        font-size: 0.6rem;
      }

      .city-badge {
        padding: 0.2rem 0.4rem;
        gap: 0.1rem;
      }

      .city-badge svg {
        width: 12px;
        height: 12px;
      }

      .city-badge span {
        font-size: 0.65rem;
      }

      .btn-register-shop {
        padding: 0.35rem 0.6rem;
        font-size: 0.65rem;
      }

      nav a {
        padding: 0.25rem 0.4rem;
        font-size: 0.75rem;
      }
    }

    @media (max-width: 400px) {
      .vitreenet-brand__subtitle {
        display: none;
      }

      .vitreenet-brand__title {
        font-size: 0.85rem;
      }

      .city-badge span {
        font-size: 0.6rem;
      }

      .btn-register-shop {
        padding: 0.3rem 0.5rem;
        font-size: 0.6rem;
      }
    }

    /* Desktop Sizes */
    @media (min-width: 768px) {
      .vitreenet-brand__mark svg {
        width: 36px;
        height: 36px;
      }

      .vitreenet-brand__title {
        font-size: 1.1rem;
      }

      .vitreenet-brand__subtitle {
        font-size: 0.7rem;
      }

      .city-badge {
        padding: 0.3rem 0.6rem;
      }

      .city-badge svg {
        width: 15px;
        height: 15px;
      }

      .city-badge span {
        font-size: 0.75rem;
      }

      .btn-register-shop {
        padding: 0.45rem 0.85rem;
        font-size: 0.75rem;
      }

      nav a {
        padding: 0.35rem 0.55rem;
        font-size: 0.85rem;
      }
    }

    /* Typography */
    .page-title {
      color: #0D1B2A;
      font-size: 1.7rem;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 4px;
      letter-spacing: -0.02em;
    }

    .page-subtitle {
      color: #94A3B8;
      font-size: 0.85rem;
      line-height: 1.6;
      margin-bottom: 18px;
      font-weight: 500;
    }

    /* Form Elements */
    #signupForm {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .form-section {
      margin-bottom: 0;
    }

    .form-label {
      display: block;
      font-size: 0.88rem;
      font-weight: 700;
      color: #334155;
      margin-bottom: 6px;
    }

    .phone-input {
      width: 100%;
      height: auto;
      border: 1.5px solid rgba(0, 196, 180, 0.25);
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 0.95rem;
      color: #0D1B2A;
      background: rgba(255, 255, 255, 0.75);
      direction: ltr;
      text-align: left;
      font-weight: 500;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
    }

    .phone-input::placeholder {
      color: #9aa8b7;
      font-weight: 400;
    }

    .phone-input:focus {
      outline: none;
      border-color: #00C4B4;
      box-shadow: 0 0 0 4px rgba(0, 196, 180, 0.13);
      background: rgba(255, 255, 255, 0.86);
    }

    .input-error {
      border-color: #ef4444 !important;
      background-color: rgba(254, 242, 242, 0.95) !important;
      box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.12) !important;
    }

    .err-text {
      color: #dc2626;
      font-size: 0.76rem;
      margin-top: 4px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* Primary Button */
    .primary-btn {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 14px;
      background: linear-gradient(135deg, #00C4B4 0%, #0077B6 100%);
      color: #fff !important;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(0, 196, 180, 0.32);
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
      position: relative;
      overflow: hidden;
      line-height: 1.2;
    }

    .primary-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -36%;
      width: 32%;
      height: 100%;
      background: linear-gradient(100deg, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.7) 50%, rgba(255, 255, 255, 0) 100%);
      transition: left 0.45s ease;
    }

    .primary-btn:hover:not(:disabled)::before {
      left: 112%;
    }

    .primary-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(0, 196, 180, 0.4);
    }

    .primary-btn:disabled {
      opacity: 0.4;
      box-shadow: none;
      transform: none;
      cursor: not-allowed;
    }

    /* Terms Checkbox */
    .terms-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0;
      cursor: pointer;
      transition: none;
      border: none;
      background: transparent;
    }

    .terms-row:hover {
      border: none;
      background: transparent;
    }

    .terms-row:focus-within {
      border: none;
      box-shadow: none;
    }

    .terms-checkbox {
      appearance: none;
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      min-width: 18px;
      margin-top: 2px;
      border: 2px solid rgba(0,196,180,0.40);
      border-radius: 5px;
      background: white;
      flex-shrink: 0;
      position: relative;
      cursor: pointer;
      transition: all 0.2s;
    }

    .terms-checkbox:checked {
      background: #00C4B4;
      border-color: #00C4B4;
    }

    .terms-checkbox:checked::after {
      content: '';
      position: absolute;
      left: 5px;
      top: 2px;
      width: 5px;
      height: 9px;
      border: 2px solid white;
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
    }

    .terms-copy {
      color: #64748b;
      font-size: 0.79rem;
      line-height: 1.7;
      font-weight: 500;
    }

    .terms-link {
      color: #00C4B4;
      font-weight: 700;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: color 0.2s ease, border-color 0.2s ease;
    }

    .terms-link:hover {
      color: #0f766e;
      border-bottom-color: #0f766e;
    }

    /* Secondary Links Section */
    .secondary-links {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid rgba(148, 163, 184, 0.24);
      text-align: center;
    }

    .link-row {
      font-size: 0.78rem;
      color: #64748b;
      margin-bottom: 10px;
      font-weight: 500;
      line-height: 1.7;
    }

    .text-link {
      color: #0077B6;
      font-weight: 700;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: color 0.2s ease, border-color 0.2s ease;
    }

    .text-link:hover {
      color: #005f8f;
      border-bottom-color: #005f8f;
    }

    .seller-link-section {
      margin-top: 6px;
      padding: 14px;
      background: rgba(255, 255, 255, 0.4);
      border: 1.5px solid rgba(0, 196, 180, 0.2);
      border-radius: 14px;
      text-align: center;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
    }

    .seller-link-section:hover {
      border-color: rgba(0, 196, 180, 0.36);
      box-shadow: 0 10px 18px -16px rgba(0, 196, 180, 0.65);
      transform: translateY(-1px);
    }

    .seller-link-label {
      font-size: 0.78rem;
      color: #4b5563;
      margin-bottom: 9px;
      font-weight: 700;
    }

    .seller-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: none;
      border-radius: 12px;
      background: linear-gradient(90deg, #10b981 10%, #0ea5e9 100%);
      color: #ffffff !important;
      font-size: 0.9rem;
      font-weight: 700;
      text-decoration: none;
      padding: 11px 28px;
      min-height: 38px;
      box-shadow: 0 5px 18px rgba(16, 185, 129, 0.30);
      transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
    }

    .seller-link:hover {
      background: linear-gradient(90deg, #10b981 10%, #0ea5e9 100%);
      color: #ffffff !important;
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(16, 185, 129, 0.42);
      filter: brightness(1.05);
    }

    /* Toast */
    #toast {
      position: fixed;
      top: 50%;
      right: 50%;
      transform: translate(50%, -50%);
      background: var(--brand-gradient);
      color: #fff;
      font-weight: 700;
      font-size: 15px;
      padding: 18px 36px;
      border-radius: 16px;
      box-shadow: 
        0 0 0 1px rgba(255, 255, 255, 0.2) inset,
        0 12px 32px rgba(14, 165, 233, 0.4);
      opacity: 0;
      z-index: 9999;
      pointer-events: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      text-align: center;
    }

    #toast.active {
      opacity: 1;
      pointer-events: auto;
      transform: translate(50%, -50%) scale(1.02);
    }

    /* Footer */
    .page-footer {
      margin-top: 56px;
      padding: 24px;
      text-align: center;
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .page-footer span {
      color: var(--text-secondary);
      font-weight: 800;
    }

    /* Responsive */
    @media (max-width: 700px) {
      .signup-card {
        padding: 26px 24px;
      }

      .page-title {
        font-size: 1.55rem;
      }
    }

    @media (max-width: 480px) {
      .signup-card {
        max-width: 100%;
        padding: 20px;
        border-radius: 18px;
      }

      .page-title {
        font-size: 1.45rem;
      }

      .page-subtitle {
        margin-bottom: 14px;
      }
    }

    @media (max-height: 700px) {
      .register-main {
        padding-top: 12px !important;
        padding-bottom: 4px !important;
      }

      .signup-card {
        padding: 22px 25px;
      }

      .page-title {
        font-size: 1.4rem;
      }

      .page-subtitle {
        font-size: 0.8rem;
        margin-bottom: 12px;
      }

      #signupForm {
        gap: 10px;
      }

      .phone-input {
        padding: 10px 14px;
        font-size: 0.9rem;
      }

      .terms-row {
        padding: 0;
      }

      .primary-btn {
        padding: 10px 14px;
      }

      .secondary-links {
        margin-top: 10px;
        padding-top: 10px;
      }

      .seller-link-section {
        padding: 10px;
      }
    }

    @media (max-width: 700px) {
      .register-main {
        align-items: center !important;
        justify-content: center;
        padding: 0 1rem !important;
      }

      .signup-card {
        transform: translateY(-8px);
      }
    }

  </style>

<body class="overflow-x-hidden">

  <!-- Toast -->
  <div id="toast">ویترینت فعلا فقط در سنندج فعال است.</div>

  <!-- Header شیشه‌ای و ریسپانسیو با استایل بهبود یافته -->
  <header class="w-full bg-white/95 shadow-md backdrop-blur-md sticky top-0 z-50">
    <div class="max-w-7xl mx-auto flex flex-row items-center justify-between px-3 sm:px-4 md:px-6 py-2 md:py-2.5 gap-2">
      <!-- لوگو و انتخاب شهر -->

  <main class="register-main relative z-10">
    <section class="signup-card">
      <!-- Title & Subtitle -->
      <div class="text-center">
        <h1 class="page-title">ثبت‌نام</h1>
        <p class="page-subtitle">شماره موبایل خود را برای ادامه وارد کنید</p>
      </div>

      <!-- Form -->
      <form id="signupForm" autocomplete="off" novalidate>
        <!-- Phone Input -->
        <div class="form-section">
          <label class="form-label" for="phoneInput">شماره موبایل</label>
          <input 
            id="phoneInput" 
            name="phone" 
            type="tel"
            class="phone-input"
            placeholder="09xxxxxxxxx" 
            inputmode="numeric" 
            autocomplete="tel-national" 
            dir="ltr" 
            maxlength="11"
            autofocus 
            required 
          />
          <div class="err-text hidden"></div>
        </div>

        <!-- Terms Checkbox -->
        <div id="termsRow" class="terms-row">
          <input type="checkbox" id="terms" required class="terms-checkbox" />
          <label class="terms-copy select-none">
            <span>قوانین و مقررات ویترینت را می‌پذیرم. </span>
            <a href="terms.html" class="terms-link">مطالعه قوانین</a>
          </label>
        </div>

        <!-- Primary CTA Button -->
        <div class="form-section">
          <button 
            id="requestOtpBtn" 
            type="submit" 
            disabled
            class="primary-btn"

  <script>
    const API_ORIGIN = window.location.origin.includes('localhost')
      ? 'http://localhost:5000'
      : window.location.origin;
    let authCsrfToken = '';

    async function getAuthCsrfToken() {
      if (authCsrfToken) return authCsrfToken;

      const response = await fetch(`${API_ORIGIN}/api/auth/csrf-token`, {
        method: 'GET',
        credentials: 'include'
      });
      const data = await response.json().catch(() => ({}));
      if (!response.ok || !data?.csrfToken) {
        throw new Error('CSRF_TOKEN_MISSING');
      }

      authCsrfToken = data.csrfToken;
      return authCsrfToken;
    }

    const form = document.getElementById('signupForm');
    const phoneInput = document.getElementById('phoneInput');
    const termsInput = document.getElementById('terms');
    const termsRow = document.getElementById('termsRow');
    const submitBtn = document.getElementById('requestOtpBtn');

    function toEnglishDigits(value = '') {
      return String(value || '')
        .replace(/[۰-۹]/g, (d) => String('۰۱۲۳۴۵۶۷۸۹'.indexOf(d)))
        .replace(/[٠-٩]/g, (d) => String('٠١٢٣٤٥٦٧٨٩'.indexOf(d)));
    }

    function normalizePhone(value = '') {
      const digits = toEnglishDigits(value).replace(/\D/g, '');
      if (digits.length === 11 && digits.startsWith('0')) return digits;
      if (digits.length === 10 && digits.startsWith('9')) return `0${digits}`;
      if (digits.length === 12 && digits.startsWith('98')) return `0${digits.slice(2)}`;
      if (digits.length === 14 && digits.startsWith('0098')) return `0${digits.slice(4)}`;
      return digits.slice(0, 11);
    }

    function isValidPhone(value = '') {
      return /^09\d{9}$/.test(normalizePhone(value));
    }

    function clearError(input) {
      input.classList.remove('input-error');
      const err = input.parentNode.querySelector('.err-text');
      if (err) {
        err.classList.add('hidden');
      }
    }

    function setError(input, msg) {
      input.classList.add('input-error');
      const err = input.parentNode.querySelector('.err-text');
      if (err) {
        err.innerText = msg;
        err.classList.remove('hidden');
      }
    }

    function setButtonState() {
      submitBtn.disabled = !(isValidPhone(phoneInput.value) && termsInput.checked);
    }

    phoneInput.addEventListener('input', () => {
      phoneInput.value = toEnglishDigits(phoneInput.value).replace(/\D/g, '').slice(0, 11);
      clearError(phoneInput);
      setButtonState();
    });

    termsRow?.addEventListener('click', (event) => {
      if (event.target.closest('a') || event.target === termsInput) return;
      termsInput.checked = !termsInput.checked;
      setButtonState();
    });

    termsInput.addEventListener('change', setButtonState);

    (function preFillFromURL() {
      try {
        const urlParams = new URLSearchParams(window.location.search);
        const phoneParam = urlParams.get('phone');
        const nameParam = urlParams.get('name');

        if (phoneParam || nameParam) {
          const formSection = document.querySelector('section.glass');
          if (formSection && !document.getElementById('booking-message')) {
            const message = document.createElement('div');
            message.id = 'booking-message';
            message.style.cssText = 'background: #f8fafc; border-radius: 12px; padding: 14px; margin-bottom: 20px; text-align: center; border: 1px solid #d1fae5;';
            message.innerHTML = '<p style="color: #374151; font-size: 14px; font-weight: 600; margin: 0;">با ساخت حساب، رزرو اخیر شما نیز ثبت خواهد شد ✓</p>';
            formSection.insertBefore(message, formSection.querySelector('form'));
          }
        }

        if (phoneParam) {
          phoneInput.value = normalizePhone(decodeURIComponent(phoneParam));
        }
      } catch (err) {
        console.warn('URL param pre-fill failed:', err);
      }
      setButtonState();
    })();

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      clearError(phoneInput);

      const phone = normalizePhone(phoneInput.value);
      if (!/^09\d{9}$/.test(phone)) {
        setError(phoneInput, 'شماره موبایل معتبر وارد کنید');
        setButtonState();
        return;
      }

      if (!termsInput.checked) {
        alert('لطفا قوانین و مقررات را بپذیرید.');
        setButtonState();
        return;
      }

      const originalBtnText = submitBtn.innerText;
      submitBtn.disabled = true;
      submitBtn.innerText = 'در حال ارسال...';

      try {
        const csrfToken = await getAuthCsrfToken();
        const response = await fetch(`${API_ORIGIN}/api/auth/register-user`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRF-Token': csrfToken,
            'X-Requested-With': 'XMLHttpRequest'
          },
          credentials: 'include',
          body: JSON.stringify({
            phone,
            termsAccepted: true
          })
        });

        const data = await response.json().catch(() => ({}));
        if (!response.ok || !data.success) {
          setError(phoneInput, 'خطا در ثبت‌نام');
          setButtonState();
          return;
        }

        sessionStorage.setItem('signup_phone', phone);
        window.location.href = `verify-user.html?phone=${encodeURIComponent(phone)}`;
      } catch {
        alert('ارتباط با سرور برقرار نشد!');
        setButtonState();
      } finally {
        submitBtn.innerText = originalBtnText;
      }
    });
  </script>
