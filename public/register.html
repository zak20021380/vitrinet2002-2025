<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
  <meta http-equiv="Strict-Transport-Security" content="max-age=63072000; includeSubDomains; preload">
  <meta http-equiv="X-Frame-Options" content="DENY">
  <meta http-equiv="Referrer-Policy" content="no-referrer">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-XSS-Protection" content="1; mode=block">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="Permissions-Policy" content="geolocation=(), microphone=(), camera=()">

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ثبت‌نام کاربر - ویترینت</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-base: #f5f7fa;
      --bg-soft: #eef2f7;
      --surface: #ffffff;
      --surface-border: #e5e7eb;
      --text-primary: #111827;
      --text-secondary: #4b5563;
      --text-muted: #6b7280;
      --brand: #10b981;
      --brand-blue: #0ea5e9;
      --brand-dark: #059669;
      --brand-blue-dark: #0284c7;
      --brand-soft: rgba(16, 185, 129, 0.14);
      --brand-primary: #0ea5e9;
      --brand-primary-dark: #0284c7;
      --focus-ring: rgba(14, 165, 233, 0.22);
    }

    body {
      font-family: 'Vazirmatn', sans-serif;
      background: linear-gradient(180deg, var(--bg-base) 0%, #fbfcfe 100%);
      min-height: 100vh;
      position: relative;
      color: var(--text-primary);
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background:
        radial-gradient(circle at 15% 10%, rgba(148, 163, 184, 0.12) 0%, transparent 38%),
        radial-gradient(circle at 85% 92%, rgba(203, 213, 225, 0.2) 0%, transparent 42%);
      pointer-events: none;
      z-index: 0;
    }

    .glass {
      width: 100%;
      max-width: 460px;
      background: var(--surface);
      border: 1px solid var(--surface-border);
      border-radius: 18px;
      box-shadow: 0 20px 45px -24px rgba(15, 23, 42, 0.28);
    }

    header {
      background: rgba(255, 255, 255, 0.86);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--surface-border);
      box-shadow: 0 6px 22px -18px rgba(17, 24, 39, 0.5);
    }

    header::after {
      content: '';
      position: absolute;
      right: 0;
      left: 0;
      bottom: -1px;
      height: 1px;
      background: linear-gradient(90deg, rgba(16, 185, 129, 0) 0%, rgba(16, 185, 129, 0.5) 30%, rgba(14, 165, 233, 0.5) 70%, rgba(14, 165, 233, 0) 100%);
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.35rem 0.65rem;
      border-radius: 12px;
      border: 1px solid rgba(16, 185, 129, 0.15);
      background: linear-gradient(135deg, rgba(16, 185, 129, 0.1) 0%, rgba(14, 165, 233, 0.1) 100%);
    }

    .brand-text {
      color: var(--brand-dark);
      background: linear-gradient(135deg, var(--brand-dark) 0%, var(--brand-blue) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    nav a {
      color: var(--text-secondary) !important;
      padding: 0.35rem 0.55rem;
      border-radius: 10px;
      font-weight: 600;
      transition: color 0.2s ease, background-color 0.2s ease;
    }

    nav a:hover {
      color: var(--brand-primary-dark) !important;
      background: rgba(14, 165, 233, 0.1);
    }

    .nav-link-accent {
      color: var(--brand-primary-dark) !important;
      background: rgba(14, 165, 233, 0.12);
    }

    .brand-btn {
      width: 100%;
      height: 44px;
      border: none;
      border-radius: 12px;
      background: var(--brand-primary);
      color: #fff !important;
      font-weight: 700;
      box-shadow: 0 12px 22px -14px rgba(14, 165, 233, 0.65);
      transition: background-color 0.18s ease, transform 0.18s ease, box-shadow 0.18s ease;
    }

    .brand-btn:hover {
      background: var(--brand-primary-dark);
      box-shadow: 0 14px 26px -14px rgba(2, 132, 199, 0.62);
    }

    .brand-btn:active {
      transform: translateY(1px);
      box-shadow: 0 10px 18px -14px rgba(2, 132, 199, 0.72);
    }

    .brand-btn:disabled {
      background: linear-gradient(135deg, #cbd5e1 0%, #dbe3ec 100%);
      color: #64748b !important;
      cursor: not-allowed;
      box-shadow: none;
    }

    .form-title {
      color: var(--text-primary);
      font-size: clamp(1.35rem, 1.9vw, 1.72rem);
      line-height: 1.45;
      letter-spacing: -0.02em;
    }

    .form-subtitle {
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    .form-label {
      font-size: 0.94rem;
      font-weight: 700;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
    }

    .phone-input {
      width: 100%;
      height: 44px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      padding: 0.55rem 0.8rem;
      font-size: 1rem;
      color: var(--text-primary);
      background: #fff;
      direction: ltr;
      text-align: left;
      unicode-bidi: plaintext;
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .phone-input::placeholder {
      direction: ltr;
      text-align: left;
      color: #9ca3af;
      font-weight: 500;
    }

    .phone-input:focus {
      outline: none;
      border-color: var(--brand-primary);
      box-shadow: 0 0 0 4px var(--focus-ring);
    }

    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .input-error {
      border-color: #ef4444 !important;
      background-color: #fef2f2 !important;
    }

    .err-text {
      color: #ef4444;
      font-size: 13px;
      margin-top: 0.3rem;
      font-weight: 600;
    }

    .terms-row {
      width: 100%;
      display: flex;
      align-items: flex-start;
      gap: 0.65rem;
      border-radius: 12px;
      padding: 0.5rem 0.7rem;
      color: var(--text-muted);
      cursor: pointer;
      transition: background-color 0.18s ease;
    }

    .terms-row:hover {
      background: #f8fafc;
    }

    .terms-checkbox {
      width: 1rem;
      height: 1rem;
      margin-top: 0.18rem;
      accent-color: var(--brand-primary);
      flex-shrink: 0;
    }

    .terms-copy {
      color: var(--text-muted);
      line-height: 1.65;
    }

    .terms-link {
      color: var(--brand-primary);
      font-weight: 700;
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .terms-link:hover {
      color: var(--brand-primary-dark);
      text-decoration: underline;
    }



    #toast {
      position: fixed;
      top: 50%;
      right: 50%;
      transform: translate(50%, -50%);
      background: var(--brand-primary);
      color: #fff;
      font-weight: bold;
      font-size: 15px;
      padding: 16px 36px;
      border-radius: 1rem;
      box-shadow: 0 10px 24px -16px rgba(14, 165, 233, 0.9);
      opacity: 0;
      z-index: 9999;
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
      min-width: 200px;
      text-align: center;
      line-height: 2.1;
    }

    #toast.active {
      opacity: 1;
      pointer-events: auto;
      transform: translate(50%, -50%) scale(1.02);
    }

    .page-footer {
      margin-top: 3rem;
      border-top: 1px solid #e5e7eb;
      color: #6b7280;
      text-align: center;
      font-size: 0.79rem;
      padding: 1.1rem 0.85rem;
      background: rgba(255, 255, 255, 0.7);
      position: relative;
      z-index: 10;
    }

    .page-footer span {
      color: var(--text-secondary);
      font-weight: 800;
    }

    @media (max-width:640px) {
      header {
        padding-top: 0.45rem !important;
        padding-bottom: 0.45rem !important;
      }

      #toast {
        font-size: 13px;
        padding: 12px 16px;
        min-width: 120px;
      }

      .glass {
        border-radius: 14px;
      }
    }
  </style>

<body class="overflow-x-hidden">

  <!-- Toast -->
  <div id="toast">ویترینت فعلا فقط در سنندج فعال است.</div>

  <!-- Header شیشه‌ای و ریسپانسیو با استایل بهبود یافته -->
  <header class="fixed top-0 inset-x-0 z-20 flex items-center justify-between px-4 sm:px-6 py-2">
    <a href="index.html" class="logo-container select-none shrink-0">
      <img src="assets/images/logo.svg" alt="ویترینت" class="w-8 h-8 sm:w-9 sm:h-9 hidden sm:block"
        onerror="this.style.display='none';this.nextElementSibling.style.display='block'" />
      <span class="brand-text text-xl md:text-2xl"
        style="display:none; font-family:'Poppins',sans-serif;">Vitrinet</span>
      <span class="brand-text text-xl sm:hidden block"
        style="font-family:'Vazirmatn',sans-serif;">ویترینت</span>
    </a>
    <nav class="flex items-center gap-1.5 text-sm sm:text-base flex-shrink-0">
      <a href="index.html">خانه</a>
      <a href="login.html" class="nav-link-accent">ورود</a>
    </nav>
  </header>

  <!-- فرم ثبت‌نام کاربر -->
  <main class="relative z-10 min-h-[calc(100vh-92px)] flex items-center justify-center px-4 pt-[74px] pb-4">
    <section class="glass p-5 sm:p-6">
      <div class="text-center mb-5">
        <h2
          class="form-title font-black mb-2">
          ثبت‌نام در ویترینت</h2>
        <p class="form-subtitle mt-2">به جامعه ویترینت خوش آمدید</p>
      </div>
      <form id="signupForm" class="space-y-4" autocomplete="off" novalidate>
        <div>
          <label class="form-label block">شماره موبایل</label>
          <input id="phoneInput" name="phone" type="tel"
            class="phone-input"
            placeholder="09xxxxxxxxx" inputmode="numeric" autocomplete="tel-national" dir="ltr" maxlength="11"
            autofocus required />
          <div class="err-text hidden"></div>
        </div>
        <div id="termsRow" class="terms-row text-sm mt-1">
          <input type="checkbox" id="terms" required class="terms-checkbox" />
          <label class="terms-copy select-none leading-7">
            <span>قوانین و مقررات ویترینت را می‌پذیرم.</span>
            <a href="terms.html" class="terms-link font-extrabold ml-1">مطالعه قوانین</a>
          </label>
        </div>
        <div class="mt-4">
          <button id="requestOtpBtn" type="submit" disabled
            class="brand-btn text-base sm:text-lg">درخواست
            کد تایید</button>
        </div>
      </form>
      <div class="text-center text-sm text-gray-500 mt-4">
        قبلاً ثبت‌نام کردی؟
        <a href="login.html" class="terms-link hover:underline font-extrabold">ورود</a>
      </div>
    </section>
  </main>

  <!-- فوتر شیک و جمع و جور -->
  <footer class="page-footer">
    © 2025 <span>Vitrinet</span>
    - همه حقوق محفوظ است.
  </footer>

  <script>
    const API_ORIGIN = window.location.origin.includes('localhost')
      ? 'http://localhost:5000'
      : window.location.origin;

    const form = document.getElementById('signupForm');
    const phoneInput = document.getElementById('phoneInput');
    const termsInput = document.getElementById('terms');
    const termsRow = document.getElementById('termsRow');
    const submitBtn = document.getElementById('requestOtpBtn');

    function toEnglishDigits(value = '') {
      return String(value || '')
        .replace(/[۰-۹]/g, (d) => String('۰۱۲۳۴۵۶۷۸۹'.indexOf(d)))
        .replace(/[٠-٩]/g, (d) => String('٠١٢٣٤٥٦٧٨٩'.indexOf(d)));
    }

    function normalizePhone(value = '') {
      const digits = toEnglishDigits(value).replace(/\D/g, '');
      if (digits.length === 11 && digits.startsWith('0')) return digits;
      if (digits.length === 10 && digits.startsWith('9')) return `0${digits}`;
      if (digits.length === 12 && digits.startsWith('98')) return `0${digits.slice(2)}`;
      if (digits.length === 14 && digits.startsWith('0098')) return `0${digits.slice(4)}`;
      return digits.slice(0, 11);
    }

    function isValidPhone(value = '') {
      return /^09\d{9}$/.test(normalizePhone(value));
    }

    function clearError(input) {
      input.classList.remove('input-error');
      const err = input.parentNode.querySelector('.err-text');
      if (err) {
        err.classList.add('hidden');
      }
    }

    function setError(input, msg) {
      input.classList.add('input-error');
      const err = input.parentNode.querySelector('.err-text');
      if (err) {
        err.innerText = msg;
        err.classList.remove('hidden');
      }
    }

    function setButtonState() {
      submitBtn.disabled = !(isValidPhone(phoneInput.value) && termsInput.checked);
    }

    phoneInput.addEventListener('input', () => {
      phoneInput.value = toEnglishDigits(phoneInput.value).replace(/\D/g, '').slice(0, 11);
      clearError(phoneInput);
      setButtonState();
    });

    termsRow?.addEventListener('click', (event) => {
      if (event.target.closest('a') || event.target === termsInput) return;
      termsInput.checked = !termsInput.checked;
      setButtonState();
    });

    termsInput.addEventListener('change', setButtonState);

    (function preFillFromURL() {
      try {
        const urlParams = new URLSearchParams(window.location.search);
        const phoneParam = urlParams.get('phone');
        const nameParam = urlParams.get('name');

        if (phoneParam || nameParam) {
          const formSection = document.querySelector('section.glass');
          if (formSection && !document.getElementById('booking-message')) {
            const message = document.createElement('div');
            message.id = 'booking-message';
            message.style.cssText = 'background: #f8fafc; border-radius: 12px; padding: 14px; margin-bottom: 20px; text-align: center; border: 1px solid #d1fae5;';
            message.innerHTML = '<p style="color: #374151; font-size: 14px; font-weight: 600; margin: 0;">با ساخت حساب، رزرو اخیر شما نیز ثبت خواهد شد ✓</p>';
            formSection.insertBefore(message, formSection.querySelector('form'));
          }
        }

        if (phoneParam) {
          phoneInput.value = normalizePhone(decodeURIComponent(phoneParam));
        }
      } catch (err) {
        console.warn('URL param pre-fill failed:', err);
      }
      setButtonState();
    })();

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      clearError(phoneInput);

      const phone = normalizePhone(phoneInput.value);
      if (!/^09\d{9}$/.test(phone)) {
        setError(phoneInput, 'شماره موبایل معتبر وارد کنید');
        setButtonState();
        return;
      }

      if (!termsInput.checked) {
        alert('لطفا قوانین و مقررات را بپذیرید.');
        setButtonState();
        return;
      }

      const originalBtnText = submitBtn.innerText;
      submitBtn.disabled = true;
      submitBtn.innerText = 'در حال ارسال...';

      try {
        const response = await fetch(`${API_ORIGIN}/api/auth/register-user`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            phone,
            termsAccepted: true
          })
        });

        const data = await response.json().catch(() => ({}));
        if (!response.ok || !data.success) {
          setError(phoneInput, 'خطا در ثبت‌نام');
          setButtonState();
          return;
        }

        sessionStorage.setItem('signup_phone', phone);
        window.location.href = `verify-user.html?phone=${encodeURIComponent(phone)}`;
      } catch {
        alert('ارتباط با سرور برقرار نشد!');
        setButtonState();
      } finally {
        submitBtn.innerText = originalBtnText;
      }
    });
  </script>
