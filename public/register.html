<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
  <meta http-equiv="Strict-Transport-Security" content="max-age=63072000; includeSubDomains; preload">
  <meta http-equiv="X-Frame-Options" content="DENY">
  <meta http-equiv="Referrer-Policy" content="no-referrer">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-XSS-Protection" content="1; mode=block">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="Permissions-Policy" content="geolocation=(), microphone=(), camera=()">

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ثبت‌نام کاربر - ویترینت</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-base: #fafbfc;
      --surface: #ffffff;
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --text-muted: #64748b;
      --brand-primary: #0ea5e9;
      --brand-primary-dark: #0284c7;
      --brand-gradient: linear-gradient(135deg, #0ea5e9 0%, #06b6d4 100%);
      --focus-ring: rgba(14, 165, 233, 0.15);
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      --shadow-lg: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
      --shadow-xl: 0 20px 40px -10px rgba(0, 0, 0, 0.15);
    }

    body {
      font-family: 'Vazirmatn', sans-serif;
      background: radial-gradient(ellipse at top, #f0f9ff 0%, #fafbfc 50%, #ffffff 100%);
      min-height: 100vh;
      color: var(--text-primary);
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -50%;
      right: -20%;
      width: 70%;
      height: 70%;
      background: radial-gradient(circle, rgba(14, 165, 233, 0.08) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -40%;
      left: -15%;
      width: 60%;
      height: 60%;
      background: radial-gradient(circle, rgba(6, 182, 212, 0.06) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }

    /* Card Container */
    .signup-card {
      width: 100%;
      max-width: 460px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(148, 163, 184, 0.15);
      border-radius: 24px;
      box-shadow: 
        0 0 0 1px rgba(255, 255, 255, 0.8) inset,
        0 20px 60px -15px rgba(15, 23, 42, 0.12),
        0 10px 30px -10px rgba(14, 165, 233, 0.08);
      padding: 48px 40px;
      position: relative;
      overflow: hidden;
    }

    .signup-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: var(--brand-gradient);
      opacity: 0.8;
    }

    /* Header */
    header {
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(148, 163, 184, 0.12);
      box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05);
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.4rem 0.75rem;
      border-radius: 14px;
      border: 1px solid rgba(14, 165, 233, 0.2);
      background: linear-gradient(135deg, rgba(14, 165, 233, 0.08) 0%, rgba(6, 182, 212, 0.08) 100%);
      transition: all 0.2s ease;
    }

    .logo-container:hover {
      border-color: rgba(14, 165, 233, 0.3);
      background: linear-gradient(135deg, rgba(14, 165, 233, 0.12) 0%, rgba(6, 182, 212, 0.12) 100%);
      transform: translateY(-1px);
    }

    .brand-text {
      background: var(--brand-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    nav a {
      color: var(--text-secondary) !important;
      padding: 0.4rem 0.65rem;
      border-radius: 12px;
      font-weight: 600;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }

    nav a:hover {
      color: var(--brand-primary-dark) !important;
      background: rgba(14, 165, 233, 0.08);
      transform: translateY(-1px);
    }

    .nav-link-accent {
      color: var(--brand-primary-dark) !important;
      background: linear-gradient(135deg, rgba(14, 165, 233, 0.12) 0%, rgba(6, 182, 212, 0.1) 100%);
    }

    /* Typography */
    .page-title {
      color: var(--text-primary);
      font-size: 32px;
      font-weight: 800;
      line-height: 1.2;
      letter-spacing: -0.03em;
      margin-bottom: 10px;
      background: linear-gradient(135deg, var(--text-primary) 0%, var(--text-secondary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .page-subtitle {
      color: var(--text-muted);
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 36px;
      font-weight: 500;
    }

    /* Form Elements */
    .form-section {
      margin-bottom: 24px;
    }

    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 700;
      color: var(--text-secondary);
      margin-bottom: 10px;
      letter-spacing: -0.01em;
    }

    .phone-input {
      width: 100%;
      height: 52px;
      border: 2px solid #e2e8f0;
      border-radius: 14px;
      padding: 0 18px;
      font-size: 16px;
      color: var(--text-primary);
      background: #ffffff;
      direction: ltr;
      text-align: left;
      font-weight: 500;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
    }

    .phone-input::placeholder {
      color: #94a3b8;
      font-weight: 400;
    }

    .phone-input:hover {
      border-color: #cbd5e1;
      box-shadow: 0 2px 4px 0 rgba(0, 0, 0, 0.06);
    }

    .phone-input:focus {
      outline: none;
      border-color: var(--brand-primary);
      box-shadow: 
        0 0 0 4px var(--focus-ring),
        0 4px 8px 0 rgba(14, 165, 233, 0.1);
      transform: translateY(-1px);
    }

    .input-error {
      border-color: #ef4444 !important;
      background-color: #fef2f2 !important;
      box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.1) !important;
    }

    .err-text {
      color: #ef4444;
      font-size: 13px;
      margin-top: 8px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* Primary Button */
    .primary-btn {
      width: 100%;
      height: 54px;
      border: none;
      border-radius: 14px;
      background: var(--brand-gradient);
      color: #fff !important;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 
        0 0 0 1px rgba(255, 255, 255, 0.2) inset,
        0 4px 12px rgba(14, 165, 233, 0.35),
        0 2px 4px rgba(14, 165, 233, 0.2);
      position: relative;
      overflow: hidden;
      letter-spacing: -0.01em;
    }

    .primary-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.2) 0%, transparent 100%);
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .primary-btn:hover:not(:disabled)::before {
      opacity: 1;
    }

    .primary-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 
        0 0 0 1px rgba(255, 255, 255, 0.3) inset,
        0 8px 20px rgba(14, 165, 233, 0.4),
        0 4px 8px rgba(14, 165, 233, 0.25);
    }

    .primary-btn:active:not(:disabled) {
      transform: translateY(0);
      box-shadow: 
        0 0 0 1px rgba(255, 255, 255, 0.2) inset,
        0 2px 8px rgba(14, 165, 233, 0.3);
    }

    .primary-btn:disabled {
      background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e1 100%);
      color: #94a3b8 !important;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    /* Terms Checkbox */
    .terms-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 16px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1px solid transparent;
    }

    .terms-row:hover {
      background: #f8fafc;
      border-color: #e2e8f0;
    }

    .terms-checkbox {
      width: 20px;
      height: 20px;
      margin-top: 2px;
      accent-color: var(--brand-primary);
      cursor: pointer;
      flex-shrink: 0;
      border-radius: 6px;
    }

    .terms-copy {
      color: var(--text-muted);
      font-size: 14px;
      line-height: 1.7;
      font-weight: 500;
    }

    .terms-link {
      color: var(--brand-primary);
      font-weight: 700;
      text-decoration: none;
      transition: all 0.2s ease;
      border-bottom: 1px solid transparent;
    }

    .terms-link:hover {
      color: var(--brand-primary-dark);
      border-bottom-color: var(--brand-primary-dark);
    }

    /* Secondary Links Section */
    .secondary-links {
      margin-top: 32px;
      padding-top: 28px;
      border-top: 1px solid #e2e8f0;
      text-align: center;
    }

    .link-row {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 20px;
      font-weight: 500;
    }

    .text-link {
      color: var(--brand-primary);
      font-weight: 700;
      text-decoration: none;
      transition: all 0.2s ease;
      border-bottom: 1px solid transparent;
      padding-bottom: 1px;
    }

    .text-link:hover {
      color: var(--brand-primary-dark);
      border-bottom-color: var(--brand-primary-dark);
    }

    .seller-link-section {
      margin-top: 18px;
      padding: 20px;
      background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      text-align: center;
      transition: all 0.2s ease;
    }

    .seller-link-section:hover {
      background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
      border-color: #cbd5e1;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px -4px rgba(0, 0, 0, 0.1);
    }

    .seller-link-label {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 10px;
      font-weight: 600;
    }

    .seller-link {
      display: inline-block;
      color: var(--brand-primary);
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
      transition: all 0.2s ease;
      border-bottom: 2px solid transparent;
      padding-bottom: 2px;
    }

    .seller-link:hover {
      color: var(--brand-primary-dark);
      border-bottom-color: var(--brand-primary-dark);
      transform: translateY(-1px);
    }

    /* Toast */
    #toast {
      position: fixed;
      top: 50%;
      right: 50%;
      transform: translate(50%, -50%);
      background: var(--brand-gradient);
      color: #fff;
      font-weight: 700;
      font-size: 15px;
      padding: 18px 36px;
      border-radius: 16px;
      box-shadow: 
        0 0 0 1px rgba(255, 255, 255, 0.2) inset,
        0 12px 32px rgba(14, 165, 233, 0.4);
      opacity: 0;
      z-index: 9999;
      pointer-events: none;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      text-align: center;
    }

    #toast.active {
      opacity: 1;
      pointer-events: auto;
      transform: translate(50%, -50%) scale(1.02);
    }

    /* Footer */
    .page-footer {
      margin-top: 56px;
      padding: 24px;
      text-align: center;
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .page-footer span {
      color: var(--text-secondary);
      font-weight: 800;
    }

    /* Responsive */
    @media (max-width: 640px) {
      .signup-card {
        padding: 36px 28px;
        border-radius: 20px;
        max-width: 100%;
      }

      .page-title {
        font-size: 28px;
      }

      .page-subtitle {
        font-size: 14px;
        margin-bottom: 32px;
      }

      .phone-input {
        height: 50px;
        font-size: 15px;
      }

      .primary-btn {
        height: 52px;
        font-size: 15px;
      }

      header {
        padding-top: 0.45rem !important;
        padding-bottom: 0.45rem !important;
      }
    }

    /* Animations */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .signup-card {
      animation: fadeInUp 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
  </style>

<body class="overflow-x-hidden">

  <!-- Toast -->
  <div id="toast">ویترینت فعلا فقط در سنندج فعال است.</div>

  <!-- Header شیشه‌ای و ریسپانسیو با استایل بهبود یافته -->
  <header class="fixed top-0 inset-x-0 z-20 flex items-center justify-between px-4 sm:px-6 py-2">
    <a href="index.html" class="logo-container select-none shrink-0">
      <img src="assets/images/logo.svg" alt="ویترینت" class="w-8 h-8 sm:w-9 sm:h-9 hidden sm:block"
        onerror="this.style.display='none';this.nextElementSibling.style.display='block'" />
      <span class="brand-text text-xl md:text-2xl"
        style="display:none; font-family:'Poppins',sans-serif;">Vitrinet</span>
      <span class="brand-text text-xl sm:hidden block"
        style="font-family:'Vazirmatn',sans-serif;">ویترینت</span>
    </a>
    <nav class="flex items-center gap-1.5 text-sm sm:text-base flex-shrink-0">
      <a href="index.html">خانه</a>
      <a href="login.html" class="nav-link-accent">ورود</a>
    </nav>
  </header>

  <!-- فرم ثبت‌نام کاربر -->
  <main class="relative z-10 min-h-[calc(100vh-92px)] flex items-center justify-center px-4 pt-[74px] pb-4">
    <section class="signup-card">
      <!-- Title & Subtitle -->
      <div class="text-center">
        <h1 class="page-title">ثبت‌نام</h1>
        <p class="page-subtitle">شماره موبایل خود را برای ادامه وارد کنید</p>
      </div>

      <!-- Form -->
      <form id="signupForm" autocomplete="off" novalidate>
        <!-- Phone Input -->
        <div class="form-section">
          <label class="form-label" for="phoneInput">شماره موبایل</label>
          <input 
            id="phoneInput" 
            name="phone" 
            type="tel"
            class="phone-input"
            placeholder="09xxxxxxxxx" 
            inputmode="numeric" 
            autocomplete="tel-national" 
            dir="ltr" 
            maxlength="11"
            autofocus 
            required 
          />
          <div class="err-text hidden"></div>
        </div>

        <!-- Terms Checkbox -->
        <div id="termsRow" class="terms-row">
          <input type="checkbox" id="terms" required class="terms-checkbox" />
          <label class="terms-copy select-none">
            <span>قوانین و مقررات ویترینت را می‌پذیرم. </span>
            <a href="terms.html" class="terms-link">مطالعه قوانین</a>
          </label>
        </div>

        <!-- Primary CTA Button -->
        <div class="form-section">
          <button 
            id="requestOtpBtn" 
            type="submit" 
            disabled
            class="primary-btn"
          >
            درخواست کد تایید
          </button>
        </div>
      </form>

      <!-- Secondary Links -->
      <div class="secondary-links">
        <!-- Login Link -->
        <div class="link-row">
          قبلاً ثبت‌نام کرده‌اید؟
          <a href="login.html" class="text-link">ورود</a>
        </div>

        <!-- Seller Signup Link -->
        <div class="seller-link-section">
          <div class="seller-link-label">می‌خواهید فروش را شروع کنید؟</div>
          <a href="seller-register.html" class="seller-link">ثبت‌نام به عنوان فروشنده</a>
        </div>
      </div>
    </section>
  </main>

  <!-- فوتر شیک و جمع و جور -->
  <footer class="page-footer">
    © 2025 <span>Vitrinet</span>
    - همه حقوق محفوظ است.
  </footer>

  <script>
    const API_ORIGIN = window.location.origin.includes('localhost')
      ? 'http://localhost:5000'
      : window.location.origin;
    let authCsrfToken = '';

    async function getAuthCsrfToken() {
      if (authCsrfToken) return authCsrfToken;

      const response = await fetch(`${API_ORIGIN}/api/auth/csrf-token`, {
        method: 'GET',
        credentials: 'include'
      });
      const data = await response.json().catch(() => ({}));
      if (!response.ok || !data?.csrfToken) {
        throw new Error('CSRF_TOKEN_MISSING');
      }

      authCsrfToken = data.csrfToken;
      return authCsrfToken;
    }

    const form = document.getElementById('signupForm');
    const phoneInput = document.getElementById('phoneInput');
    const termsInput = document.getElementById('terms');
    const termsRow = document.getElementById('termsRow');
    const submitBtn = document.getElementById('requestOtpBtn');

    function toEnglishDigits(value = '') {
      return String(value || '')
        .replace(/[۰-۹]/g, (d) => String('۰۱۲۳۴۵۶۷۸۹'.indexOf(d)))
        .replace(/[٠-٩]/g, (d) => String('٠١٢٣٤٥٦٧٨٩'.indexOf(d)));
    }

    function normalizePhone(value = '') {
      const digits = toEnglishDigits(value).replace(/\D/g, '');
      if (digits.length === 11 && digits.startsWith('0')) return digits;
      if (digits.length === 10 && digits.startsWith('9')) return `0${digits}`;
      if (digits.length === 12 && digits.startsWith('98')) return `0${digits.slice(2)}`;
      if (digits.length === 14 && digits.startsWith('0098')) return `0${digits.slice(4)}`;
      return digits.slice(0, 11);
    }

    function isValidPhone(value = '') {
      return /^09\d{9}$/.test(normalizePhone(value));
    }

    function clearError(input) {
      input.classList.remove('input-error');
      const err = input.parentNode.querySelector('.err-text');
      if (err) {
        err.classList.add('hidden');
      }
    }

    function setError(input, msg) {
      input.classList.add('input-error');
      const err = input.parentNode.querySelector('.err-text');
      if (err) {
        err.innerText = msg;
        err.classList.remove('hidden');
      }
    }

    function setButtonState() {
      submitBtn.disabled = !(isValidPhone(phoneInput.value) && termsInput.checked);
    }

    phoneInput.addEventListener('input', () => {
      phoneInput.value = toEnglishDigits(phoneInput.value).replace(/\D/g, '').slice(0, 11);
      clearError(phoneInput);
      setButtonState();
    });

    termsRow?.addEventListener('click', (event) => {
      if (event.target.closest('a') || event.target === termsInput) return;
      termsInput.checked = !termsInput.checked;
      setButtonState();
    });

    termsInput.addEventListener('change', setButtonState);

    (function preFillFromURL() {
      try {
        const urlParams = new URLSearchParams(window.location.search);
        const phoneParam = urlParams.get('phone');
        const nameParam = urlParams.get('name');

        if (phoneParam || nameParam) {
          const formSection = document.querySelector('section.glass');
          if (formSection && !document.getElementById('booking-message')) {
            const message = document.createElement('div');
            message.id = 'booking-message';
            message.style.cssText = 'background: #f8fafc; border-radius: 12px; padding: 14px; margin-bottom: 20px; text-align: center; border: 1px solid #d1fae5;';
            message.innerHTML = '<p style="color: #374151; font-size: 14px; font-weight: 600; margin: 0;">با ساخت حساب، رزرو اخیر شما نیز ثبت خواهد شد ✓</p>';
            formSection.insertBefore(message, formSection.querySelector('form'));
          }
        }

        if (phoneParam) {
          phoneInput.value = normalizePhone(decodeURIComponent(phoneParam));
        }
      } catch (err) {
        console.warn('URL param pre-fill failed:', err);
      }
      setButtonState();
    })();

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      clearError(phoneInput);

      const phone = normalizePhone(phoneInput.value);
      if (!/^09\d{9}$/.test(phone)) {
        setError(phoneInput, 'شماره موبایل معتبر وارد کنید');
        setButtonState();
        return;
      }

      if (!termsInput.checked) {
        alert('لطفا قوانین و مقررات را بپذیرید.');
        setButtonState();
        return;
      }

      const originalBtnText = submitBtn.innerText;
      submitBtn.disabled = true;
      submitBtn.innerText = 'در حال ارسال...';

      try {
        const csrfToken = await getAuthCsrfToken();
        const response = await fetch(`${API_ORIGIN}/api/auth/register-user`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRF-Token': csrfToken,
            'X-Requested-With': 'XMLHttpRequest'
          },
          credentials: 'include',
          body: JSON.stringify({
            phone,
            termsAccepted: true
          })
        });

        const data = await response.json().catch(() => ({}));
        if (!response.ok || !data.success) {
          setError(phoneInput, 'خطا در ثبت‌نام');
          setButtonState();
          return;
        }

        sessionStorage.setItem('signup_phone', phone);
        window.location.href = `verify-user.html?phone=${encodeURIComponent(phone)}`;
      } catch {
        alert('ارتباط با سرور برقرار نشد!');
        setButtonState();
      } finally {
        submitBtn.innerText = originalBtnText;
      }
    });
  </script>
