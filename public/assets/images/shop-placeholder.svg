<svg width="640" height="480" viewBox="0 0 640 480" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ویترینت">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eef2ff"/>
      <stop offset="52%" stop-color="#e8f0ff"/>
      <stop offset="100%" stop-color="#ecfdf5"/>
    </linearGradient>
    <linearGradient id="awning" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7C83FD"/>
      <stop offset="100%" stop-color="#5bc4b8"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="58%">
      <stop offset="0%" stop-color="#7C83FD" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#7C83FD" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="640" height="480" fill="url(#bg)"/>
  <rect width="640" height="480" fill="url(#glow)"/>

  <!-- centered storefront (kept inside the central safe zone for cover-cropping) -->
  <g transform="translate(320 210)">
    <!-- body -->
    <rect x="-100" y="-24" width="200" height="124" rx="18" fill="#ffffff" fill-opacity="0.92" stroke="#7C83FD" stroke-opacity="0.18" stroke-width="2"/>
    <!-- awning -->
    <path d="M-114 -24 q12 -36 38 -36 h152 q26 0 38 36 z" fill="url(#awning)"/>
    <g fill="#ffffff" fill-opacity="0.26">
      <path d="M-114 -24 h38 q-4 -24 -12 -36 q-14 12 -26 36 z"/>
      <path d="M-38 -24 h38 q-4 -24 -12 -36 q-14 12 -26 36 z"/>
      <path d="M38 -24 h38 q-4 -24 -12 -36 q-14 12 -26 36 z"/>
    </g>
    <!-- door -->
    <rect x="-24" y="38" width="48" height="62" rx="9" fill="#7C83FD" fill-opacity="0.16"/>
    <!-- windows -->
    <rect x="-78" y="8" width="44" height="44" rx="9" fill="#5bc4b8" fill-opacity="0.2"/>
    <rect x="34" y="8" width="44" height="44" rx="9" fill="#5bc4b8" fill-opacity="0.2"/>
  </g>

  <text x="320" y="356" text-anchor="middle" fill="#574fd6" fill-opacity="0.92" font-family="Vazirmatn, sans-serif" font-size="34" font-weight="800">ویترینت</text>
</svg>
