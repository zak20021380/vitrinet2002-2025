<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta http-equiv="Strict-Transport-Security" content="max-age=63072000; includeSubDomains; preload">
<meta http-equiv="Referrer-Policy" content="no-referrer">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta http-equiv="X-XSS-Protection" content="1; mode=block">
<meta name="referrer" content="no-referrer">
<meta http-equiv="Permissions-Policy" content="geolocation=(), microphone=(), camera=()">

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>دسته‌بندی فروشگاه‌ها - ویترینت</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style-index.css" />
  <link rel="stylesheet" href="/css/premium-mobile-menu.css" />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@800&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet" />
  <style>
    body {
      font-family: 'Vazirmatn', sans-serif;
      background: linear-gradient(135deg, #e0f9ff 0%, #f8fafc 50%, #e8f5e9 100%);
      min-height: 100vh;
      overflow-x: hidden;
    }
    .glass {
      background: rgba(255,255,255,0.95);
      box-shadow: 0 20px 60px rgba(16, 185, 129, 0.08), 0 8px 24px rgba(14, 165, 233, 0.06);
      backdrop-filter: blur(20px);
      border-radius: 2rem;
      border: 1px solid rgba(255, 255, 255, 0.8);
    }
    .category-card {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      height: 100%;
      min-height: 380px;
      padding: 2rem 1.75rem 1.75rem;
      border-radius: 2rem;
      text-align: right;
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.96), rgba(248, 250, 252, 0.88));
      border: 1px solid rgba(148, 163, 184, 0.18);
      box-shadow: 0 18px 48px rgba(15, 118, 110, 0.08), 0 8px 24px rgba(14, 165, 233, 0.06);
      overflow: hidden;
      transition: transform 0.35s ease, box-shadow 0.35s ease, border-color 0.35s ease;
    }
    .category-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top left, rgba(45, 212, 191, 0.12), transparent 45%),
                  radial-gradient(circle at bottom right, rgba(14, 165, 233, 0.12), transparent 50%);
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }
    .category-card:hover::before,
    .category-card:focus-within::before {
      opacity: 1;
    }
    .category-card:hover,
    .category-card:focus-within {
      transform: translateY(-10px);
      border-color: rgba(16, 185, 129, 0.35);
      box-shadow: 0 28px 56px rgba(13, 148, 136, 0.18), 0 16px 40px rgba(14, 165, 233, 0.12);
    }
    .category-card__top {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1.1rem;
      padding: 1.25rem 1.4rem;
      border-radius: 1.55rem;
      overflow: hidden;
      background-color: rgba(16, 185, 129, 0.85);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.18);
    }
    .category-card__top::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(110deg, rgba(255, 255, 255, 0.25), transparent 55%);
      mix-blend-mode: screen;
      opacity: 0.65;
      pointer-events: none;
    }
    .category-card__headline {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.35rem;
      text-align: right;
      position: relative;
      z-index: 1;
    }
    .category-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.015em;
      background: rgba(255, 255, 255, 0.28);
      color: rgba(255, 255, 255, 0.95);
      text-transform: uppercase;
    }
    .category-title {
      font-size: 1.45rem;
      font-weight: 800;
      color: #0b1120;
      line-height: 1.25;
      letter-spacing: -0.03em;
      text-shadow: 0 3px 12px rgba(15, 118, 110, 0.25);
    }
    .category-card__top .category-title {
      color: #ffffff;
      text-shadow: 0 4px 16px rgba(0, 0, 0, 0.22);
    }
    .cat-icon {
      position: relative;
      z-index: 1;
      border-radius: 1.5rem;
      width: 78px;
      height: 78px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.86);
      border: 1.5px solid rgba(255, 255, 255, 0.55);
      box-shadow: 0 12px 28px rgba(15, 118, 110, 0.22);
      transition: transform 0.35s ease, box-shadow 0.35s ease;
    }
    .cat-icon::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(140deg, rgba(16, 185, 129, 0.18), rgba(14, 165, 233, 0.14));
      opacity: 0;
      transition: opacity 0.35s ease;
    }
    .cat-icon svg {
      width: 44px;
      height: 44px;
      position: relative;
      z-index: 1;
      filter: drop-shadow(0 4px 12px rgba(13, 148, 136, 0.35));
    }
    .category-card:hover .cat-icon,
    .category-card:focus-within .cat-icon {
      transform: translateY(-6px) scale(1.05);
      box-shadow: 0 20px 42px rgba(15, 118, 110, 0.28);
    }
    .category-card:hover .cat-icon::after,
    .category-card:focus-within .cat-icon::after {
      opacity: 1;
    }
    .category-card__content {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      position: relative;
      z-index: 1;
      flex-grow: 1;
    }
    .category-desc {
      font-size: 0.92rem;
      color: #4b5563;
      line-height: 1.8;
      font-weight: 500;
    }
    .category-meta {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      flex-wrap: wrap;
      padding: 0.85rem 1rem;
      border-radius: 1.1rem;
      background: linear-gradient(135deg, rgba(16, 185, 129, 0.12), rgba(14, 165, 233, 0.08));
      border: 1px solid rgba(16, 185, 129, 0.15);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.25);
    }
    .shop-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.45rem 0.85rem;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 700;
      background: linear-gradient(120deg, rgba(16, 185, 129, 0.18), rgba(45, 212, 191, 0.28));
      color: #047857;
      box-shadow: 0 6px 18px rgba(16, 185, 129, 0.25);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }
    .shop-badge i {
      font-size: 1.05rem;
    }
    .shop-badge:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 22px rgba(16, 185, 129, 0.32);
    }
    .sample-link {
      color: #0284c7;
      font-size: 0.82rem;
      font-weight: 600;
      padding: 0.35rem 0.65rem;
      background: rgba(255, 255, 255, 0.82);
      border-radius: 0.9rem;
      border: 1px solid rgba(14, 165, 233, 0.25);
      box-shadow: 0 6px 14px rgba(14, 165, 233, 0.18);
      text-decoration: none;
      transition: all 0.25s ease;
    }
    .sample-link:hover {
      color: #0369a1;
      border-color: rgba(14, 165, 233, 0.45);
      box-shadow: 0 10px 24px rgba(14, 165, 233, 0.25);
    }
    .no-shop-text {
      color: #94a3b8;
      font-size: 0.82rem;
      font-weight: 600;
      font-style: italic;
    }
    .btn-grad {
      background: linear-gradient(135deg, #10b981 0%, #0ea5e9 100%);
      color: #fff !important;
      box-shadow: 0 4px 16px rgba(16, 185, 129, 0.25), 0 2px 8px rgba(14, 165, 233, 0.2);
      font-weight: 700;
      border-radius: 1rem;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      min-height: 48px;
      padding: 0.75rem 1.5rem;
      text-decoration: none;
      position: relative;
      overflow: hidden;
    }
    .btn-grad::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      transition: left 0.5s ease;
    }
    .btn-grad:hover::before {
      left: 100%;
    }
    .btn-grad span {
      width: 100%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      position: relative;
      z-index: 1;
      font-size: 0.9375rem;
    }
    .btn-grad:hover,
    .btn-grad:active {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(16, 185, 129, 0.35), 0 4px 12px rgba(14, 165, 233, 0.3);
    }
    .btn-grad:active {
      transform: translateY(0);
    }
    .category-card .btn-grad {
      width: 100%;
      min-height: 52px;
      font-size: 0.95rem;
      border-radius: 1.2rem;
      box-shadow: 0 12px 24px rgba(14, 165, 233, 0.25);
      letter-spacing: 0.01em;
    }
    .category-card .btn-grad svg {
      width: 22px;
      height: 22px;
    }
    .category-card__cta {
      margin-top: auto;
    }
    .logo-vitreenet {
      font-family: 'Poppins', sans-serif;
      font-weight: 800;
      font-size: 1.55rem;
      background: linear-gradient(90deg,#11d6ad 0%, #10b981 60%, #2db4e8 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: 1.7px;
      filter: drop-shadow(0 1px 5px #10b98118);
      white-space: nowrap;
      display: inline-block;
      padding-right: 3px;
      padding-left: 3px;
      line-height: 1.1;
      text-shadow: none;
    }
    @media (min-width: 640px) {
      .logo-vitreenet { font-size: 1.9rem; }
    }
    @media (min-width: 1024px) {
      .logo-vitreenet { font-size: 2.05rem; }
    }
    /* Responsive adjustments */
    @media (max-width: 1024px) {
      .category-card {
        min-height: 360px;
        padding: 1.85rem 1.5rem 1.65rem;
      }
      .category-card__top { padding: 1.2rem 1.35rem; }
      .cat-icon { width: 72px; height: 72px; }
      .cat-icon svg { width: 40px; height: 40px; }
      .category-title { font-size: 1.35rem; }
    }
    @media (max-width: 768px) {
      .category-card {
        min-height: 340px;
        padding: 1.65rem 1.35rem 1.5rem;
        gap: 1.15rem;
      }
      .category-card__top { gap: 0.95rem; padding: 1.1rem 1.25rem; }
      .category-chip { font-size: 0.72rem; padding: 0.25rem 0.7rem; }
      .cat-icon { width: 68px; height: 68px; }
      .cat-icon svg { width: 38px; height: 38px; }
      .category-title { font-size: 1.25rem; }
      .category-desc { font-size: 0.88rem; line-height: 1.7; }
      .category-meta { padding: 0.8rem 0.95rem; gap: 0.7rem; }
      .btn-grad { min-height: 48px; padding: 0.7rem 1.25rem; }
      .btn-grad span { font-size: 0.9rem; }
    }
    @media (max-width: 640px) {
      .category-card {
        min-height: 320px;
        padding: 1.5rem 1.25rem 1.35rem;
        border-radius: 1.75rem;
      }
      .category-card__top {
        border-radius: 1.45rem;
        padding: 1rem 1.15rem;
      }
      .cat-icon { width: 64px; height: 64px; }
      .cat-icon svg { width: 36px; height: 36px; }
      .category-title { font-size: 1.15rem; }
      .category-desc { font-size: 0.85rem; line-height: 1.65; }
      .sample-link { font-size: 0.78rem; padding: 0.35rem 0.6rem; }
      .shop-badge { font-size: 0.78rem; padding: 0.4rem 0.75rem; }
      .btn-grad { min-height: 46px; padding: 0.65rem 1.15rem; }
      .btn-grad span { font-size: 0.88rem; }
    }
    @media (max-width: 480px) {
      .category-card {
        min-height: 300px;
        padding: 1.35rem 1.1rem 1.2rem;
        border-radius: 1.6rem;
      }
      .category-card__top {
        padding: 0.95rem 1.05rem;
        gap: 0.85rem;
      }
      .cat-icon { width: 60px; height: 60px; }
      .cat-icon svg { width: 34px; height: 34px; }
      .category-title { font-size: 1.08rem; }
      .category-desc { font-size: 0.82rem; line-height: 1.6; }
      .category-meta { padding: 0.7rem 0.8rem; }
      .shop-badge { font-size: 0.75rem; padding: 0.38rem 0.7rem; }
      .sample-link { font-size: 0.75rem; padding: 0.32rem 0.55rem; }
      .btn-grad {
        min-height: 44px;
        padding: 0.6rem 1rem;
        border-radius: 1.1rem;
      }
      .btn-grad span { font-size: 0.85rem; }
    }
    @media (max-width: 639px) {
      #registerShopBtn { box-shadow: none; }
    }
    /* mobile adjustments */
    @media (max-width: 767px) {
      .hide-on-mobile { display: none !important; }
    }
    ::-webkit-scrollbar { width: 7px; }
    ::-webkit-scrollbar-thumb {
      background: linear-gradient(135deg, #10b981 0%, #0ea5e9 100%);
      border-radius: 10px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(16, 185, 129, 0.05);
    }

    /* Grid improvements for proper card display */
    #categoriesGrid {
      grid-auto-rows: 1fr;
      align-items: stretch;
    }
    #categoriesGrid > div {
      display: contents;
    }
    #categoriesGrid .category-card {
      width: 100%;
    }

    /* Search Results Dropdown */
    .search-wrapper {
      position: relative;
    }
    .search-results {
      position: absolute;
      top: calc(100% + 0.5rem);
      left: 0;
      right: 0;
      background: white;
      border-radius: 1.25rem;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15), 0 8px 24px rgba(0, 0, 0, 0.08);
      max-height: 70vh;
      overflow-y: auto;
      z-index: 1000;
      display: none;
      border: 1px solid rgba(16, 185, 129, 0.2);
    }
    .search-results.active {
      display: block;
      animation: slideDown 0.3s ease;
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .search-result-item {
      padding: 0.875rem 1.25rem;
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
      cursor: pointer;
      transition: background 0.2s ease;
      display: flex;
      align-items: center;
      gap: 0.875rem;
      text-decoration: none;
      color: inherit;
    }
    .search-result-item:hover {
      background: linear-gradient(135deg, rgba(16, 185, 129, 0.08), rgba(14, 165, 233, 0.06));
    }
    .search-result-item:last-child {
      border-bottom: none;
    }
    .search-result-icon {
      width: 44px;
      height: 44px;
      border-radius: 0.75rem;
      background: linear-gradient(135deg, #10b981, #0ea5e9);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.25);
    }
    .search-result-icon i {
      color: white;
      font-size: 1.25rem;
    }
    .search-result-content {
      flex: 1;
      min-width: 0;
    }
    .search-result-title {
      font-weight: 700;
      font-size: 0.9375rem;
      color: #1f2937;
      margin-bottom: 0.25rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .search-result-desc {
      font-size: 0.8125rem;
      color: #6b7280;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .search-result-badge {
      padding: 0.25rem 0.625rem;
      border-radius: 999px;
      font-size: 0.6875rem;
      font-weight: 700;
      text-transform: uppercase;
      flex-shrink: 0;
    }
    .search-result-badge.shop {
      background: linear-gradient(120deg, rgba(16, 185, 129, 0.15), rgba(45, 212, 191, 0.25));
      color: #047857;
    }
    .search-result-badge.category {
      background: linear-gradient(120deg, rgba(14, 165, 233, 0.15), rgba(59, 130, 246, 0.25));
      color: #0369a1;
    }
    .search-empty {
      padding: 2.5rem 1.5rem;
      text-align: center;
      color: #9ca3af;
    }
    .search-empty i {
      font-size: 3rem;
      margin-bottom: 0.75rem;
      opacity: 0.5;
    }
    .search-empty-text {
      font-size: 0.9375rem;
      font-weight: 600;
    }

    /* Mobile optimizations for search results */
    @media (max-width: 768px) {
      .search-results {
        max-height: 60vh;
        border-radius: 1rem;
      }
      .search-result-item {
        padding: 0.75rem 1rem;
        gap: 0.75rem;
      }
      .search-result-icon {
        width: 38px;
        height: 38px;
        border-radius: 0.625rem;
      }
      .search-result-icon i {
        font-size: 1.125rem;
      }
      .search-result-title {
        font-size: 0.875rem;
      }
      .search-result-desc {
        font-size: 0.75rem;
      }
      .search-result-badge {
        font-size: 0.625rem;
        padding: 0.2rem 0.5rem;
      }
      .search-empty {
        padding: 2rem 1rem;
      }
      .search-empty i {
        font-size: 2.5rem;
      }
      .search-empty-text {
        font-size: 0.875rem;
      }
    }
    @media (max-width: 480px) {
      .search-results {
        max-height: 50vh;
        border-radius: 0.875rem;
      }
      .search-result-item {
        padding: 0.625rem 0.875rem;
        gap: 0.625rem;
      }
      .search-result-icon {
        width: 34px;
        height: 34px;
        border-radius: 0.5rem;
      }
      .search-result-icon i {
        font-size: 1rem;
      }
      .search-result-title {
        font-size: 0.8125rem;
      }
      .search-result-desc {
        font-size: 0.6875rem;
      }
      .search-empty {
        padding: 1.5rem 0.75rem;
      }
      .search-empty i {
        font-size: 2rem;
      }
    }

    /* Categories header and search — scoped responsive redesign */
    #categoriesHeader {
      background: rgba(255, 255, 255, 0.85) !important;
      border-bottom: 1px solid rgba(229, 231, 235, 0.6);
      box-shadow: 0 4px 32px rgba(0, 0, 0, 0.06) !important;
      backdrop-filter: blur(24px) saturate(150%) !important;
    }

    #categoriesHeader .categories-header__inner {
      min-height: 70px;
      flex-wrap: nowrap !important;
      gap: 1rem;
      padding-top: 0.62rem !important;
      padding-bottom: 0.62rem !important;
    }

    #categoriesHeader .categories-brand-group {
      gap: 0.65rem;
      min-width: 0;
    }

    #categoriesHeader .logo-vitreenet {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0;
      background: none;
      color: #059669;
      filter: none;
      letter-spacing: 0;
      text-decoration: none;
    }

    #categoriesHeader .categories-brand-mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      flex: 0 0 38px;
      border-radius: 12px;
      background: linear-gradient(145deg, #10b981, #14b8a6 55%, #06b6d4);
      color: #fff;
      box-shadow: 0 7px 16px rgba(16, 185, 129, 0.24), inset 0 1px 0 rgba(255, 255, 255, 0.28);
      font-family: 'Poppins', sans-serif;
      font-size: 1.08rem;
      font-weight: 800;
      line-height: 1;
    }

    #categoriesHeader .categories-brand-word {
      background: linear-gradient(90deg, #059669, #0d9488 55%, #0891b2);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-size: 1.28rem;
      font-weight: 800;
      line-height: 1;
      letter-spacing: 0.035em;
    }

    #categoriesHeader .categories-city-badge {
      min-height: 36px;
      margin-left: 0 !important;
      padding: 0.38rem 0.68rem !important;
      gap: 0.35rem !important;
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 11px !important;
      background: linear-gradient(90deg, rgba(16, 185, 129, 0.9) 70%, rgba(14, 165, 233, 0.9)) !important;
      box-shadow: 0 6px 14px rgba(16, 185, 129, 0.18), inset 0 1px 0 rgba(255, 255, 255, 0.22);
      backdrop-filter: blur(5px) !important;
    }

    #categoriesHeader .categories-city-badge svg {
      width: 15px;
      height: 15px;
      margin-left: 0 !important;
      filter: none !important;
    }

    #categoriesHeader .categories-city-badge svg path {
      fill: #fff;
    }

    #categoriesHeader .categories-city-badge span {
      color: #fff !important;
      font-size: 0.72rem !important;
      font-weight: 850 !important;
      text-shadow: none !important;
      letter-spacing: 0 !important;
    }

    #categoriesHeader .categories-header-nav {
      gap: 0.3rem !important;
      min-width: 0;
    }

    #categoriesHeader .main-nav-link {
      min-height: 40px;
      flex-direction: row !important;
      flex: 0 0 auto !important;
      padding: 0.5rem 0.78rem !important;
      border: 1px solid transparent;
      border-radius: 11px;
      color: #475569 !important;
      font-size: 0.82rem !important;
      font-weight: 750 !important;
      line-height: 1;
      transition: color 0.18s ease, background 0.18s ease, border-color 0.18s ease;
    }

    #categoriesHeader .main-nav-link:hover,

<script>
  (function () {
    function initCategoriesMobileMenu() {
      const toggle = document.getElementById('mobileMenuToggle');
      const close = document.getElementById('mobileMenuClose');
      const menu = document.getElementById('mobileMenu');
      const backdrop = document.getElementById('mobileMenuBackdrop');
      const panel = document.getElementById('mobileMenuPanel');
      const lines = [
        document.getElementById('menuLine1'),
        document.getElementById('menuLine2'),
        document.getElementById('menuLine3')
      ];
      if (!toggle || !close || !menu || !backdrop || !panel) return;

      let open = false;
      function setOpen(next) {
        open = next;
        toggle.setAttribute('aria-expanded', String(next));
        menu.setAttribute('aria-hidden', String(!next));
        menu.classList.toggle('pointer-events-none', !next);
        menu.classList.toggle('pointer-events-auto', next);
        backdrop.classList.toggle('active', next);
        panel.classList.toggle('translate-x-full', !next);
        panel.classList.toggle('translate-x-0', next);
        lines[0]?.classList.toggle('rotate-45', next);
        lines[0]?.classList.toggle('translate-y-[7px]', next);
        lines[1]?.classList.toggle('opacity-0', next);
        lines[1]?.classList.toggle('scale-0', next);
        lines[2]?.classList.toggle('-rotate-45', next);
        lines[2]?.classList.toggle('-translate-y-[7px]', next);
        document.body.style.overflow = next ? 'hidden' : '';
      }

      toggle.addEventListener('click', function () { setOpen(!open); });
      close.addEventListener('click', function () { setOpen(false); });
      backdrop.addEventListener('click', function () { setOpen(false); });
      panel.querySelectorAll('a').forEach(function (link) {
        link.addEventListener('click', function () { setOpen(false); });
      });
      document.addEventListener('keydown', function (event) {
        if (event.key === 'Escape' && open) setOpen(false);
      });
      window.addEventListener('resize', function () {
        if (window.innerWidth >= 768 && open) setOpen(false);
      });
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initCategoriesMobileMenu);
    } else {
      initCategoriesMobileMenu();
    }
  })();
</script>
